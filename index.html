<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>SPACE STOCK</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap" rel="stylesheet">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
font-family:'Orbitron',sans-serif;
background: radial-gradient(circle at top,#140a2a,#000);
color:white;
overflow-x:hidden;
}

h1{
text-align:center;
font-size:40px;
color:#e9d5ff;
text-shadow:0 0 25px #a855f7;
}

#game{
padding:20px;
}

#stocks{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
}

.card{
background:rgba(255,255,255,0.05);
border:1px solid #a855f7;
padding:15px;
margin:10px;
border-radius:15px;
box-shadow:0 0 20px rgba(168,85,247,0.5);
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
}

button{
background:black;
border:1px solid #a855f7;
color:#c084fc;
padding:6px 12px;
margin:3px;
cursor:pointer;
}

button:hover{
background:#a855f7;
color:black;
}

.unlockBtn{
animation:glow 1.5s infinite alternate;
}

@keyframes glow{
from{box-shadow:0 0 5px #a855f7;}
to{box-shadow:0 0 20px #a855f7;}
}

.locked{
opacity:0.3;
}

canvas{
background:black;
margin-top:10px;
}

#allGraph{
width:100%;
height:300px;
}

#legend{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-bottom:20px;
}

.legend-item{
cursor:pointer;
border:1px solid #a855f7;
padding:5px 10px;
}

#nicknameScreen{
position:fixed;
inset:0;
background:black;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
}

#achievementPopup{
position:fixed;
bottom:20px;
right:20px;
background:#7e22ce;
padding:15px;
display:none;
border-radius:10px;
}

#achievementScreen{
position:fixed;
inset:0;
background:black;
padding:40px;
overflow:auto;
display:none;
}

#gachaScreen{
position:fixed;
inset:0;
background:black;
display:none;
flex-direction:column;
align-items:center;
justify-content:center;
}

#mintScreen{
position:fixed;
inset:0;
background:black;
display:none;
padding:40px;
}

#bgCanvas{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
}

</style>
</head>

<body>

<canvas id="bgCanvas"></canvas>

<div id="nicknameScreen">
<h1>SPACE STOCK</h1>
<input id="nicknameInput">
<button onclick="startGame()">START</button>
</div>

<div id="game" style="display:none">

<h1>SPACE STOCK MARKET</h1>

<button onclick="openAchievements()">🏆 実績</button>
<button onclick="openGacha()">🎰 ガチャ</button>
<button onclick="openMint()">💎 ミント</button>

<p>👤 <span id="playerName"></span></p>
<p>💰 <span id="money"></span>G</p>
<p>⭐ <span id="points"></span></p>
<p>💎 <span id="mint"></span></p>
<p>⏳ <span id="timer"></span></p>

<h2>📊 全銘柄グラフ</h2>

<canvas id="allGraph"></canvas>

<div id="legend"></div>

<div id="stocks"></div>

</div>

<div id="achievementPopup"></div>

<div id="achievementScreen">
<h2>🏆 実績</h2>
<div id="achievementList"></div>
<button onclick="closeAchievements()">閉じる</button>
</div>

<div id="gachaScreen">
<h2>🎰 GACHA</h2>
<div id="gachaResult">READY</div>
<button onclick="spinGacha()">回す(50ミント)</button>
<button onclick="closeGacha()">閉じる</button>
</div>

<div id="mintScreen">
<h2>💎 ミント</h2>
<div id="mintList"></div>
<button onclick="closeMint()">閉じる</button>
</div>

<script>

let data = JSON.parse(localStorage.getItem("spaceStockData"));

if(!data){

data={
nickname:"",
money:10000,
points:0,
mint:0,
mintInventory:{},
stocks:[],
lastUpdate:Date.now(),
totalBuys:0,
achievementsUnlocked:[]
};

for(let i=0;i<10;i++){

data.stocks.push({
name:"STOCK-"+(i+1),
price:Math.floor(Math.random()*500)+500,
owned:0,
unlocked:i<3,
history:[500],
visible:true
});

}

save();

}

function save(){
localStorage.setItem("spaceStockData",JSON.stringify(data));
}

function startGame(){

let name=document.getElementById("nicknameInput").value;

if(name==="") name=data.nickname;

if(name==="") return;

data.nickname=name;

save();

document.getElementById("nicknameScreen").style.display="none";
document.getElementById("game").style.display="block";

document.getElementById("playerName").innerText=data.nickname;

updateUI();

setInterval(updateTimer,1000);
checkPriceUpdate();

}

window.onload=function(){

if(data.nickname){

document.getElementById("nicknameScreen").style.display="none";
document.getElementById("game").style.display="block";

document.getElementById("playerName").innerText=data.nickname;

updateUI();

setInterval(updateTimer,1000);
checkPriceUpdate();

}

}

function updateUI(){

document.getElementById("money").innerText=data.money;
document.getElementById("points").innerText=data.points;
document.getElementById("mint").innerText=data.mint;

const stocksDiv=document.getElementById("stocks");
stocksDiv.innerHTML="";

data.stocks.forEach((s,i)=>{

const card=document.createElement("div");
card.className="card"+(s.unlocked?"":" locked");

card.innerHTML=`<h3>${s.name}</h3>
<p>価格 ${s.price}</p>
<p>保有 ${s.owned}</p>`;

if(s.unlocked){

[1,10,100].forEach(n=>{
let b=document.createElement("button");
b.innerText=n+"株買う";
b.onclick=()=>buyStock(i,n);
card.appendChild(b);
});

[1,10,100].forEach(n=>{
let b=document.createElement("button");
b.innerText=n+"株売る";
b.onclick=()=>sellStock(i,n);
card.appendChild(b);
});

}else{

let b=document.createElement("button");
b.className="unlockBtn";
b.innerText="500Pで解放";
b.onclick=()=>unlockStock(i);
card.appendChild(b);

}

stocksDiv.appendChild(card);

});

drawGraph();
drawLegend();

save();

}

function buyStock(i,n){

let s=data.stocks[i];
let cost=s.price*n;

if(data.money<cost) return;

data.money-=cost;

s.owned+=n;

s.buyPrice=s.price;

data.totalBuys++;

updateUI();

}

function sellStock(i,n){

let s=data.stocks[i];

if(s.owned<n) return;

let profit=(s.price-(s.buyPrice||s.price))*n;

data.money+=s.price*n;

if(profit>0){
data.mint+=Math.floor(profit/10);
}

s.owned-=n;

updateUI();

}

function unlockStock(i){

if(data.points>=500){

data.points-=500;
data.stocks[i].unlocked=true;

updateUI();

}

}

function checkPriceUpdate(){

if(Date.now()-data.lastUpdate>60000){

updatePrices();

data.lastUpdate=Date.now();

}

setTimeout(checkPriceUpdate,10000);

}

function updatePrices(){

data.stocks.forEach(s=>{

let change=(Math.random()-0.5)*100;

s.price=Math.max(10,Math.floor(s.price+change));

s.history.push(s.price);

if(s.history.length>30) s.history.shift();

});

data.points+=100;

updateUI();

}

function updateTimer(){

let sec=Math.floor((60000-(Date.now()-data.lastUpdate))/1000);

if(sec<0) sec=0;

document.getElementById("timer").innerText=sec+"秒";

}

function drawGraph(){

const canvas=document.getElementById("allGraph");
const ctx=canvas.getContext("2d");

canvas.width=canvas.clientWidth;
canvas.height=300;

ctx.clearRect(0,0,canvas.width,canvas.height);

const colors=["cyan","yellow","red","lime","orange","white","pink","blue","magenta","lightgreen"];

data.stocks.forEach((s,i)=>{

if(!s.visible) return;

ctx.beginPath();
ctx.strokeStyle=colors[i%colors.length];

s.history.forEach((p,index)=>{

let x=index*20;
let y=300-(p/10);

if(index==0) ctx.moveTo(x,y);
else ctx.lineTo(x,y);

});

ctx.stroke();

});

}

function drawLegend(){

const legend=document.getElementById("legend");
legend.innerHTML="";

data.stocks.forEach((s,i)=>{

let div=document.createElement("div");
div.className="legend-item";
div.innerText=s.name;

div.onclick=()=>{

s.visible=!s.visible;

updateUI();

};

legend.appendChild(div);

});

}

function openAchievements(){

document.getElementById("achievementScreen").style.display="block";

}

function closeAchievements(){

document.getElementById("achievementScreen").style.display="none";

}

function openGacha(){
document.getElementById("gachaScreen").style.display="flex";
}

function closeGacha(){
document.getElementById("gachaScreen").style.display="none";
}

const mintTable=[
{name:"青ミント",rate:40},
{name:"赤ミント",rate:25},
{name:"緑ミント",rate:15},
{name:"紫ミント",rate:10},
{name:"金ミント",rate:7},
{name:"宇宙ミント",rate:2},
{name:"ブラックホールミント",rate:1}
];

function spinGacha(){

if(data.mint<50){
alert("ミント不足");
return;
}

data.mint-=50;

let r=Math.random()*100;
let sum=0;
let result="";

for(let m of mintTable){

sum+=m.rate;

if(r<=sum){

result=m.name;
break;

}

}

if(!data.mintInventory[result]) data.mintInventory[result]=0;

data.mintInventory[result]++;

document.getElementById("gachaResult").innerText=result;

updateUI();

}

function openMint(){

document.getElementById("mintScreen").style.display="block";

const list=document.getElementById("mintList");

list.innerHTML="";

for(let m in data.mintInventory){

let div=document.createElement("div");

div.innerText=m+" : "+data.mintInventory[m];

list.appendChild(div);

}

}

function closeMint(){
document.getElementById("mintScreen").style.display="none";
}

/* 星背景 */

const bg=document.getElementById("bgCanvas");
const ctx=bg.getContext("2d");

let stars=[];

function resize(){

bg.width=window.innerWidth;
bg.height=window.innerHeight;

}

resize();

for(let i=0;i<200;i++){

stars.push({
x:Math.random()*bg.width,
y:Math.random()*bg.height,
r:Math.random()*2
});

}

function animateStars(){

ctx.clearRect(0,0,bg.width,bg.height);

ctx.fillStyle="white";

stars.forEach(s=>{

ctx.beginPath();
ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
ctx.fill();

s.y+=0.2;

if(s.y>bg.height) s.y=0;

});

requestAnimationFrame(animateStars);

}

animateStars();

</script>

</body>
</html>
