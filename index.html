<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CYBER STOCK 2099</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
margin:0;
font-family:'Orbitron',sans-serif;
background:#050510;
color:#00f5ff;
text-align:center;
overflow-x:hidden;
}
#particles{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-2;
}
body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background:linear-gradient(45deg,#001f3f,#0a0a2a,#001a33,#000814);
background-size:400% 400%;
animation:bgMove 15s ease infinite;
z-index:-3;
}
@keyframes bgMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}
h1{
font-size:40px;
text-shadow:0 0 10px #00f5ff,0 0 20px #00f5ff;
}
.card{
background:rgba(0,0,30,0.8);
border:1px solid #00f5ff;
box-shadow:0 0 15px #00f5ff55;
padding:15px;
margin:10px;
border-radius:12px;
}
button{
padding:6px 12px;
margin:4px;
border-radius:6px;
border:1px solid #00f5ff;
background:transparent;
color:#00f5ff;
cursor:pointer;
}
button:hover{
background:#00f5ff;
color:#000;
}
.locked{opacity:0.4;}
canvas{
background:rgba(0,0,30,0.7);
border:1px solid #00f5ff;
border-radius:10px;
}
@media(max-width:600px){
h1{font-size:26px;}
}
</style>
</head>

<body>

<canvas id="particles"></canvas>

<div id="loginScreen">
<h1>CYBER STOCK 2099</h1>
<input id="nicknameInput" placeholder="ニックネーム">
<br><br>
<button onclick="startGame()">START</button>
</div>

<div id="gameScreen" style="display:none;">

<h1>CYBER STOCK 2099</h1>

<p>👤 <span id="playerName"></span></p>
<p>💰 <span id="points"></span></p>
<p>📰 <span id="news">市場待機中</span></p>
<p>⏳ <span id="timer"></span></p>

<div id="stocksArea"></div>

<h2>📈 市場グラフ</h2>
<canvas id="chart"></canvas>

<br>
<button onclick="toggleBGM()">🎵 BGM ON/OFF</button>

<audio id="bgm" loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_115b9bce59.mp3?filename=future-technology-ambient-110624.mp3" type="audio/mpeg">
</audio>

</div>

<script>
let nickname;
let points=50000;
let chart;
let nextChangeTime;
const CHANGE_INTERVAL=3600000;

const stockConfig=[
{name:"Tech",unlockCost:0,personality:"growth"},
{name:"Energy",unlockCost:0,personality:"stable"},
{name:"Game",unlockCost:0,personality:"volatile"},
{name:"AI",unlockCost:15000,personality:"growth"},
{name:"Food",unlockCost:20000,personality:"stable"},
{name:"Auto",unlockCost:30000,personality:"stable"},
{name:"Space",unlockCost:50000,personality:"risky"},
{name:"Medical",unlockCost:80000,personality:"growth"},
{name:"Crypto",unlockCost:120000,personality:"volatile"},
{name:"Media",unlockCost:200000,personality:"risky"}
];

let stocks;

function initStocks(){
stocks=stockConfig.map(s=>({
...s,
price:Math.floor(Math.random()*100)+50,
owned:0,
unlocked:s.unlockCost===0,
history:[Math.floor(Math.random()*100)+50],
lockedShares:0
}));
}

const newsList=[
{text:"好景気",effect:20},
{text:"暴落",effect:-20},
{text:"技術革新",effect:15},
{text:"金融不安",effect:-15},
{text:"安定相場",effect:0}
];

function startGame(){
nickname=document.getElementById("nicknameInput").value;
if(!nickname)return;

localStorage.setItem("nickname",nickname);
document.getElementById("playerName").innerText=nickname;
document.getElementById("loginScreen").style.display="none";
document.getElementById("gameScreen").style.display="block";

if(!localStorage.getItem("gameData")){
initStocks();
nextChangeTime=Date.now()+CHANGE_INTERVAL;
saveGame();
}else{
loadGame();
processOffline();
}

renderStocks();
updateDisplay();
createChart();
startTimer();
}

function saveGame(){
localStorage.setItem("gameData",JSON.stringify({
points,stocks,nextChangeTime
}));
}

function loadGame(){
let data=JSON.parse(localStorage.getItem("gameData"));
points=data.points;
stocks=data.stocks;
nextChangeTime=data.nextChangeTime;
document.getElementById("playerName").innerText=localStorage.getItem("nickname");
}

function processOffline(){
let now=Date.now();
while(now>=nextChangeTime){
marketUpdateCore();
nextChangeTime+=CHANGE_INTERVAL;
}
}

function trade(i,amount){
let s=stocks[i];
if(!s.unlocked)return;

if(amount>0){
let cost=s.price*amount;
if(points>=cost){
points-=cost;
s.owned+=amount;
s.lockedShares+=amount;
}
}else{
let sell=Math.abs(amount);
if(sell>s.owned-s.lockedShares){
alert("この変動中に買った株は売れません");
return;
}
points+=s.price*sell;
s.owned-=sell;
}
saveGame();
renderStocks();
updateDisplay();
}

function unlockStock(i){
if(points>=stocks[i].unlockCost){
points-=stocks[i].unlockCost;
stocks[i].unlocked=true;
saveGame();
renderStocks();
updateDisplay();
}
}

function renderStocks(){
let area=document.getElementById("stocksArea");
area.innerHTML="";
stocks.forEach((s,i)=>{
if(!s.unlocked){
area.innerHTML+=`
<div class="card locked">
${s.name}<br>
解禁:${s.unlockCost}<br>
<button onclick="unlockStock(${i})">解禁</button>
</div>`;
}else{
area.innerHTML+=`
<div class="card">
${s.name}<br>
価格:${s.price}<br>
保有:${s.owned}<br>
<button onclick="trade(${i},1)">1株買</button>
<button onclick="trade(${i},-1)">1株売</button>
</div>`;
}
});
}

function marketUpdateCore(){
let news=newsList[Math.floor(Math.random()*newsList.length)];
document.getElementById("news").innerText=news.text;

stocks.forEach(s=>{
let change=Math.floor(Math.random()*20)-10;
s.price+=change+news.effect;
if(s.price<10)s.price=10;
s.history.push(s.price);
s.lockedShares=0;
});
updateChart();
saveGame();
}

function startTimer(){
setInterval(()=>{
let now=Date.now();
if(now>=nextChangeTime){
marketUpdateCore();
nextChangeTime=now+CHANGE_INTERVAL;
}
let remain=nextChangeTime-now;
let m=Math.floor(remain/60000);
let s=Math.floor((remain%60000)/1000);
document.getElementById("timer").innerText=m+"分 "+s+"秒";
},1000);
}

function updateDisplay(){
document.getElementById("points").innerText=points;
}

function createChart(){
let ctx=document.getElementById("chart").getContext("2d");
chart=new Chart(ctx,{
type:"line",
data:{
labels:stocks[0].history.map((_,i)=>i),
datasets:stocks.map(s=>({
label:s.name,
data:s.history,
borderColor:"#00f5ff",
tension:0.3
}))
}
});
}

function updateChart(){
chart.data.labels=stocks[0].history.map((_,i)=>i);
chart.data.datasets=stocks.map(s=>({
label:s.name,
data:s.history,
borderColor:"#00f5ff",
tension:0.3
}));
chart.update();
}

function toggleBGM(){
let bgm=document.getElementById("bgm");
if(bgm.paused)bgm.play();
else bgm.pause();
}

/* 粒子 */
const canvas=document.getElementById("particles");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
let particles=[];
for(let i=0;i<100;i++){
particles.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:Math.random()*2+1,dx:(Math.random()-0.5)*0.5,dy:(Math.random()-0.5)*0.5});
}
function animate(){
ctx.clearRect(0,0,canvas.width,canvas.height);
particles.forEach(p=>{
p.x+=p.dx;p.y+=p.dy;
if(p.x<0||p.x>canvas.width)p.dx*=-1;
if(p.y<0||p.y>canvas.height)p.dy*=-1;
ctx.beginPath();
ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
ctx.fillStyle="#00f5ff";
ctx.shadowBlur=10;
ctx.shadowColor="#00f5ff";
ctx.fill();
});
requestAnimationFrame(animate);
}
animate();
</script>
</body>
</html>
