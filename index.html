<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>SPACE STOCK</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
/* --- 宇宙背景・基本スタイル --- */
body{ margin:0; font-family:'Orbitron',sans-serif; background-color: #080212; color:white; overflow-x:hidden; position:relative; min-height:100vh; }
.space-bg { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; overflow: hidden; background: radial-gradient(circle at center, #140a2a 0%, #000 100%); }
.particle { position: absolute; border-radius: 50%; filter: blur(20px); opacity: 0.5; animation: floatAnim 20s infinite ease-in-out alternate; mix-blend-mode: screen; }
.p1 { width: 300px; height: 300px; background: #4c1d95; top: -10%; left: 10%; animation-duration: 25s; }
.p2 { width: 250px; height: 250px; background: #7e22ce; bottom: 10%; right: -5%; animation-duration: 22s; animation-delay: -5s; }
.p3 { width: 400px; height: 400px; background: #1e1b4b; top: 40%; left: 40%; animation-duration: 30s; animation-delay: -10s; }

@keyframes floatAnim {
    0% { transform: translate(0, 0) scale(1); }
    100% { transform: translate(-20px, 40px) scale(0.9); }
}

@keyframes legendaryGlow {
    0% { text-shadow: 0 0 10px #ff00ff, 0 0 20px #ff0000; transform: scale(1) rotate(-2deg); color: #fff; }
    50% { text-shadow: 0 0 30px #ff00ff, 0 0 50px #ff0000, 0 0 80px #ff0000; transform: scale(1.1) rotate(2deg); color: #ffd700; }
    100% { text-shadow: 0 0 10px #ff00ff, 0 0 20px #ff0000; transform: scale(1) rotate(-2deg); color: #fff; }
}
.legendary-drop { animation: legendaryGlow 0.3s infinite alternate !important; }
.legendary-text { color: #ffd700; text-shadow: 0 0 10px #ff0000, 0 0 20px #ff00ff; font-weight: bold; animation: legendaryGlow 0.3s infinite alternate; display: inline-block; }

@keyframes epicGlow {
    0% { text-shadow: 0 0 10px #0ff, 0 0 20px #00f; color: #fff; transform: scale(1); }
    100% { text-shadow: 0 0 20px #0ff, 0 0 40px #00f, 0 0 60px #fff; color: #e0ffff; transform: scale(1.1); }
}
.epic-drop { animation: epicGlow 0.4s infinite alternate !important; font-weight: bold; }
.epic-text { color: #e0ffff; text-shadow: 0 0 10px #0ff; animation: epicGlow 0.4s infinite alternate; display: inline-block; font-weight: bold; }

/* --- UIスタイル --- */
h1{ text-align:center; font-size:40px; color:#e9d5ff; text-shadow:0 0 25px #a855f7,0 0 50px #7e22ce; }
#game{ padding:20px; max-width: 1200px; margin: 0 auto; position: relative; z-index: 1; }
.menu-bar { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; justify-content: center; }
.menu-btn { background: linear-gradient(45deg, #1f0b3b, #3b0764); border: 2px solid #a855f7; color: #e9d5ff; padding: 10px 15px; font-size: 15px; font-weight: bold; border-radius: 8px; cursor: pointer; text-transform: uppercase; box-shadow: 0 0 10px rgba(168, 85, 247, 0.3); transition: all 0.3s ease; }
.menu-btn:hover:not(:disabled) { background: linear-gradient(45deg, #3b0764, #7e22ce); box-shadow: 0 0 20px #a855f7; transform: translateY(-2px); color: white; }
.menu-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.destroy-btn { border-color: #ef4444; color: #fca5a5; }
.destroy-btn:hover:not(:disabled) { background: linear-gradient(45deg, #7f1d1d, #b91c1c); box-shadow: 0 0 20px #ef4444; color: white; }

.status-bar { display: flex; flex-wrap: wrap; gap: 20px; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 10px; border: 1px solid rgba(168,85,247,0.3); margin-bottom: 20px; font-size: 18px; backdrop-filter: blur(5px); }
#buffStatus { color: #c084fc; font-weight: bold; margin-bottom: 10px; min-height: 24px; }
#stocks{ display:grid; grid-template-columns:repeat(auto-fill,minmax(250px,1fr)); gap: 15px; }
.card{ background:rgba(10,5,25,0.7); border:1px solid #a855f7; padding:15px; border-radius:15px; box-shadow:0 0 20px rgba(168,85,247,0.2); transition:0.3s; position:relative; backdrop-filter: blur(10px); }
.card-actions { display: flex; flex-direction: column; gap: 5px; margin-top: 10px; }
.btn-group { display: flex; gap: 5px; }
button{ background:black; border:1px solid #a855f7; color:#c084fc; padding:6px 10px; cursor:pointer; transition:0.3s; border-radius: 4px; flex: 1; }
button:hover:not(:disabled){ background:#a855f7; color:black; box-shadow:0 0 10px #a855f7; }
button:disabled{ border-color:#444; color:#666; cursor:not-allowed; }
.unlockBtn{ width: 100%; padding: 10px; font-weight: bold; animation:unlockGlow 1.5s infinite alternate; }
@keyframes unlockGlow{ from{box-shadow:0 0 5px #a855f7;} to{box-shadow:0 0 20px #a855f7;} }
.locked{ opacity:0.6; filter: grayscale(0.6); }

canvas{ background:rgba(0,0,0,0.6); border:1px solid rgba(168,85,247,0.3); border-radius: 10px; margin-top:10px; width:100%; height:300px; }
#legend{ display:flex; flex-wrap:wrap; gap:10px; margin-top: 10px; margin-bottom:20px; }
.legend-item{ cursor:pointer; padding:5px 10px; border:1px solid #a855f7; color:#c084fc; border-radius:5px; font-size:14px; background: rgba(0,0,0,0.5); }
.legend-item.hidden-stock{ opacity: 0.4; border-style: dashed; }
#notificationContainer { position:fixed; bottom:20px; right:20px; z-index:5000; display:flex; flex-direction:column; gap:10px; pointer-events:none; }

/* モーダル群 */
.modal-screen { position:fixed; inset:0; background:rgba(0,0,0,0.85); backdrop-filter: blur(8px); padding:40px; z-index:3000; overflow:auto; display:none; flex-direction:column; align-items:center; }
.modal-content { background: rgba(17, 6, 34, 0.95); border: 2px solid #a855f7; border-radius: 15px; padding: 30px; width: 80%; max-width: 600px; box-shadow: 0 0 50px rgba(168,85,247,0.5); }
.modal-close { margin-top: 20px; padding: 10px 30px; font-size: 16px; background: transparent; width:100%; }
.list-item { border:1px solid #a855f7; padding:15px; margin-bottom:10px; border-radius:10px; background: rgba(255,255,255,0.05); display: flex; justify-content: space-between; align-items: center; }
select { background: black; color: white; border: 1px solid #a855f7; padding: 10px; font-size: 16px; border-radius: 5px; width: 100%; margin-bottom: 15px; outline:none; }

/* 樹形図用スタイル */
.tree-ul { list-style-type: none; padding-left: 20px; border-left: 1px dashed #a855f7; margin-top: 10px; }
.tree-li { position: relative; margin: 10px 0; padding-left: 15px; }
.tree-li::before { content: ""; position: absolute; top: 12px; left: -20px; width: 20px; border-top: 1px dashed #a855f7; }
.tree-base { font-size: 18px; font-weight: bold; color: #ffd700; margin-top: 20px; border-bottom: 1px solid #a855f7; padding-bottom: 5px; }
.tree-recipe { color: #e9d5ff; font-size: 14px; }
.tree-unknown { color: #888; font-style: italic; }
</style>
</head>

<body>
<div class="space-bg"><div class="particle p1"></div><div class="particle p2"></div><div class="particle p3"></div></div>

<div id="nicknameScreen" style="position:fixed;inset:0;background:rgba(0,0,0,0.8);backdrop-filter:blur(10px);display:flex;justify-content:center;align-items:center;flex-direction:column;z-index:9999;">
    <h1 style="font-size:60px; margin-bottom:10px;">SPACE STOCK</h1>
    <input id="nicknameInput" placeholder="名無しトレーダー" style="padding:15px; font-size:20px; background:rgba(0,0,0,0.7); border:2px solid #a855f7; border-radius:10px; color:white; margin-bottom:30px; width:280px; text-align:center;">
    <button class="menu-btn" onclick="startGame()" style="padding:15px 60px; font-size:24px;">🚀 START</button>
</div>

<div id="game" style="display:none;">
<h1 style="font-size:32px; margin-top:0;">SPACE STOCK MARKET</h1>
<p style="text-align:center; font-size:18px;">👤 <span id="playerName"></span></p>

<div class="menu-bar">
    <button class="menu-btn" onclick="openScreen('tutorialScreen')">📖 遊び方</button>
    <button class="menu-btn" onclick="openAchievements()">🏆 実績</button>
    <button class="menu-btn" onclick="openGacha()">🎰 ガチャ</button>
    <button class="menu-btn" onclick="openMint()">💎 ミント</button>
    <button class="menu-btn" onclick="openCraft()">🔨 素材合成</button>
    <button class="menu-btn" onclick="openBrew()">🧪 醸造</button>
    <button class="menu-btn" onclick="openBag()">🎒 バッグ</button>
    <button class="menu-btn destroy-btn" onclick="openDestroy()">💥 破壊</button>
</div>

<div class="status-bar">
    <div>💰 所持金: <span id="money"></span>G</div>
    <div>⭐ ポイント: <span id="points"></span></div>
    <div>💎 破片: <span id="mint"></span></div>
    <div>🌿 異星のミント: <span id="alienMints"></span></div>
    <div>⏳ 変動まで: <span id="timer"></span></div>
</div>

<div id="buffStatus"></div>
<canvas id="allGraph"></canvas>
<div id="legend"></div>
<div id="stocks"></div>
</div>

<div id="notificationContainer"></div>

<div id="tutorialScreen" class="modal-screen"><div class="modal-content"><h2 style="text-align:center;">🚀 遊び方</h2><p>株を売買して利益を出し「ミントの破片」を集めます。<br>ガチャで素材を引き、「素材合成」でベースを作り、「醸造」でポーションを作ります。</p><button class="modal-close menu-btn" onclick="closeScreen('tutorialScreen')">閉じる</button></div></div>

<div id="achievementScreen" class="modal-screen"><div class="modal-content"><h2>🏆 実績</h2><div id="achievementList"></div><button class="modal-close menu-btn" onclick="closeScreen('achievementScreen')">閉じる</button></div></div>

<div id="gachaScreen" class="modal-screen"><div class="modal-content" style="text-align:center;"><h2>🎰 ガチャ</h2><div id="gachaResult" style="font-size:36px; margin:20px 0; min-height:50px;">READY</div><div style="display:flex; gap:15px; justify-content:center;"><button id="gachaBtn" class="menu-btn" onclick="spinGacha(1)">1回 (15破片)</button><button id="gacha10Btn" class="menu-btn" onclick="spinGacha(10)">10連 (150破片)</button></div><button class="modal-close menu-btn" onclick="closeScreen('gachaScreen')" style="margin-top:30px;">閉じる</button></div></div>

<div id="mintScreen" class="modal-screen"><div class="modal-content"><h2>💎 ミントコレクション</h2><div id="mintList"></div><button class="modal-close menu-btn" onclick="closeScreen('mintScreen')">閉じる</button></div></div>

<div id="bagScreen" class="modal-screen"><div class="modal-content"><h2>🎒 バッグ (ポーション)</h2><div id="bagList"></div><button class="modal-close menu-btn" onclick="closeScreen('bagScreen')">閉じる</button></div></div>

<div id="craftScreen" class="modal-screen">
    <div class="modal-content">
        <h2 style="margin-top:0; color:#ffd700;">🔨 素材合成 (ベース作り)</h2>
        <p style="font-size:13px; color:#c084fc;">ミントを2つ組み合わせて、醸造の基礎となる「〇〇のもと」を作ります。</p>
        <label>🟣 素材 1:</label><select id="craftMat1"></select>
        <label>🟣 素材 2:</label><select id="craftMat2"></select>
        <button class="menu-btn" style="width:100%; margin-top:10px;" onclick="doCraft()">合成する</button>
        <button class="modal-close menu-btn" onclick="closeScreen('craftScreen')">閉じる</button>
    </div>
</div>

<div id="brewScreen" class="modal-screen">
    <div class="modal-content">
        <h2 style="margin-top:0;">🧪 ポーション醸造</h2>
        <button class="menu-btn" style="width:100%; margin-bottom:15px; background:linear-gradient(45deg, #0f172a, #1e293b);" onclick="openRecipeTree()">🌳 レシピツリーを確認</button>
        <label style="color:#ffd700;">🟡 ベース素材 (〇〇のもと):</label><select id="brewBase"></select>
        <label style="color:#e9d5ff;">🔵 追加ミント 1:</label><select id="brewMat1"></select>
        <label style="color:#e9d5ff;">🔵 追加ミント 2:</label><select id="brewMat2"></select>
        <button class="menu-btn" style="width:100%; margin-top:10px; font-size:20px;" onclick="doBrew()">✨ 醸造する ✨</button>
        <button class="modal-close menu-btn" onclick="closeScreen('brewScreen')">閉じる</button>
    </div>
</div>

<div id="recipeTreeScreen" class="modal-screen">
    <div class="modal-content">
        <h2 style="margin-top:0; color:#e9d5ff;">🌳 醸造レシピツリー</h2>
        <div id="recipeTreeContainer" style="max-height: 400px; overflow-y: auto;"></div>
        <button class="modal-close menu-btn" onclick="closeScreen('recipeTreeScreen'); openScreen('brewScreen');">戻る</button>
    </div>
</div>

<script>
// 基本データ・初期化 (前回の状態を引き継ぎ)
let data = JSON.parse(localStorage.getItem("spaceStockData")) || null;
let timerInterval = null, priceCheckTimeout = null, isGachaSpinning = false;
let graphPoints = [], hoveredPoint = null; 

const stockTemplates = [
    { name: "アストロ通信", basePrice: 300, vol: 0.02 }, { name: "スターダスト鉱業", basePrice: 500, vol: 0.05 },
    { name: "未知文明発掘", basePrice: 800, vol: 0.18 }, { name: "ワープドライブ社", basePrice: 1200, vol: 0.08 },
    { name: "ギャラクシー", basePrice: 1500, vol: 0.12 }, { name: "オールドアース", basePrice: 2000, vol: 0.04 },
    { name: "AIコア", basePrice: 3500, vol: 0.03 }, { name: "クアンタム", basePrice: 2500, vol: 0.06 },
    { name: "ツーリズム", basePrice: 600, vol: 0.10 }, { name: "オメガホールディングス", basePrice: 10000, vol: 0.05 }
];

// ★ 新ポーションと効果
const potionEffects = {
    "💰 黄金の雫": { desc: "所持金即座に +100,000G", type: "instant", action: (m=1) => data.money += 100000 * m },
    "⭐ 知識の霊薬": { desc: "ポイント即座に +5,000P", type: "instant", action: (m=1) => data.points += 5000 * m },
    "📈 ハイパードライブ薬": { desc: "3分間、株価の変動幅が2倍", type: "buff", duration: 180000 },
    "🛡 プロテクトジェル": { desc: "3分間、株価下落時の下落幅半減", type: "buff", duration: 180000 },
    "💎 ミントブースト": { desc: "3分間、売却時のミント破片獲得量2倍", type: "buff", duration: 180000 },
    "🚀 ギャラクシーブル": { desc: "3分間、株価が上がりやすくなる", type: "buff", duration: 180000 },
    "⏳ タイムワープ薬": { desc: "即座に20回分の価格変動", type: "instant", action: (m=1) => { for(let i=0;i<20*m;i++) updatePrices(true); updateUI(); }},
    "✨ 奇跡の雫": { desc: "所持金 +1,000,000G、ポイント +50,000P", type: "instant", action: (m=1) => { data.money+=1000000*m; data.points+=50000*m; }},
    "❓ 異質なポーション": { desc: "2分間、世界を「破壊」可能に...", type: "buff", duration: 120000 },
    "🌍 星の恵み": { desc: "3分間、ミントの破片獲得量が3倍", type: "buff", duration: 180000 },
    "🌋 ヴォルカニック・ブル": { desc: "3分間、株価が超絶上がりやすくなる", type: "buff", duration: 180000 },
    "🧂 ソルトバリア": { desc: "3分間、株価の下落を完全に無効化", type: "buff", duration: 180000 },
    "🍦 チョコミントポーション": { desc: "10分間、他のポーションの効果を2倍！", type: "buff", duration: 600000 },
    "🌶️ スパイシーサワー": { desc: "1分間、変動間隔が10秒ごとに", type: "buff", duration: 60000 },
    "❄️ フロストエナジー": { desc: "2分間、次の価格変動を予知", type: "buff", duration: 120000 },
    "💧 マダム・ザ・ウォーター": { desc: "即座にミントガチャを10回引く", type: "instant", action: (m=1) => { closeScreen("bagScreen"); spinGacha(10 * m, true); }},
    // 新追加
    "🍨 アイスクリームポーション": { desc: "3分間、株価の変動がとても緩やかになる", type: "buff", duration: 180000 },
    "🍸 ソルティドッグ": { desc: "3分間、売却時の利益が1.5倍になる", type: "buff", duration: 180000 },
    "🥤 コーラ": { desc: "即座に10回分の価格変動を起こし、ミント破片を300得る", type: "instant", action: (m=1) => { for(let i=0;i<10*m;i++) updatePrices(true); data.mint += 300 * m; updateUI(); }}
};

// ★ レシピツリー定義
const treeRecipes = [
    { result: "❓ 異質なポーション", base: "🛠️ ポーションのもと", m1: "ブラッドミント", m2: "ギャラクシーミント" },
    { result: "🌍 星の恵み", base: "🛠️ ポーションのもと", m1: "プラネットミント", m2: "プラネットミント" },
    { result: "🌋 ヴォルカニック・ブル", base: "🛠️ ポーションのもと", m1: "マグマミント", m2: "マグマミント" },
    { result: "🧂 ソルトバリア", base: "🛠️ ポーションのもと", m1: "ソルティミント", m2: "ソルティミント" },
    { result: "💧 マダム・ザ・ウォーター", base: "🛠️ ポーションのもと", m1: "マダムミント", m2: "任意" },
    
    { result: "🍦 チョコミントポーション", base: "🛠️ スイーツのもと", m1: "ミルクミント", m2: "チョコチップミント" },
    { result: "🍨 アイスクリームポーション", base: "🛠️ スイーツのもと", m1: "ミルクミント", m2: "ミルクミント" },
    
    { result: "🌶️ スパイシーサワー", base: "🛠️ 炭酸のもと", m1: "スパイシーミント", m2: "任意" },
    { result: "❄️ フロストエナジー", base: "🛠️ 炭酸のもと", m1: "フロストミント", m2: "任意" },
    { result: "🥤 コーラ", base: "🛠️ 炭酸のもと", m1: "焼け焦げたミント", m2: "スイーツミント" },

    { result: "🍸 ソルティドッグ", base: "🛠️ お酒のもと", m1: "ソルティミント", m2: "ウォーターミント" }
];

// 初期化群
if(!data) {
    data = { nickname:"", money:30000, points:0, mint:0, alienMints:0, mintInventory:{}, potions:{}, activeBuffs:{}, stocks:[], totalBuys:0, gachaCount:0, brewCount:0, alienPotionCount:0, discoveredMints:[], discoveredPotions:[], achievementsUnlocked:[] };
    for(let i=0;i<10;i++) data.stocks.push({ name: stockTemplates[i].name, price: stockTemplates[i].basePrice, owned: 0, unlocked: i<3, unlockCost: 500+i*300, history: [stockTemplates[i].basePrice], buyPrice: 0, visible: i<3, vol: stockTemplates[i].vol, nextChange: 0 });
}
function save(){ localStorage.setItem("spaceStockData",JSON.stringify(data)); }

// --- ゲーム進行コア関数 (省略なし) ---
function startGame(){
    let name=document.getElementById("nicknameInput").value; data.nickname = name || "名無しトレーダー";
    document.getElementById("nicknameScreen").style.display="none"; document.getElementById("game").style.display="block";
    document.getElementById("playerName").innerText=data.nickname;
    updateUI(); startTimers(); save();
}

function startTimers(){ if(!timerInterval) timerInterval = setInterval(updateTimer,1000); if(!priceCheckTimeout) checkPriceUpdate(); }
function getTickInterval() { return isBuffActive("🌶️ スパイシーサワー") ? 10000 : 60000; }
function isBuffActive(buffName){ return data.activeBuffs[buffName] && data.activeBuffs[buffName] > Date.now(); }

function calculateNextChange(stock) {
    let volatility = stock.price * (stock.vol || 0.05);
    if(isBuffActive("📈 ハイパードライブ薬")) volatility *= 2;
    if(isBuffActive("🍨 アイスクリームポーション")) volatility *= 0.3; // アイス効果で緩やかに
    let change = (Math.random() - 0.5) * volatility;
    if(isBuffActive("🚀 ギャラクシーブル")) change = (Math.random() - 0.2) * volatility; 
    if(isBuffActive("🌋 ヴォルカニック・ブル")) change = (Math.random() - 0.1) * volatility * 1.5;
    if(change < 0 && isBuffActive("🛡 プロテクトジェル")) change *= 0.5;
    if(change < 0 && isBuffActive("🧂 ソルトバリア")) change = 0;
    return Math.floor(change);
}

function updatePrices(skipUI = false){
    data.stocks.forEach(stock=>{
        stock.price = Math.max(10, Math.floor(stock.price + (stock.nextChange || 0)));
        stock.history.push(stock.price); if(stock.history.length>30) stock.history.shift();
        stock.nextChange = calculateNextChange(stock);
    });
    data.points+=100; if(!skipUI) updateUI();
}

function checkPriceUpdate(){
    const now=Date.now(); const elapsed = now - (data.lastUpdate || now); const tickInterval = getTickInterval();
    if(elapsed >= tickInterval){
        let updates = Math.floor(elapsed / tickInterval); if (updates > 30) updates = 30;
        for(let i=0; i<updates; i++) updatePrices(true);
        data.lastUpdate = now - (elapsed % tickInterval); updateUI();
    }
    priceCheckTimeout = setTimeout(checkPriceUpdate, 1000);
}

function updateTimer(){
    const now = Date.now(); const tickInterval = getTickInterval();
    const sec=Math.max(0,Math.floor((tickInterval-(now-(data.lastUpdate||now)))/1000));
    document.getElementById("timer").innerText=sec+"秒";
    let buffText = "";
    for(let buff in data.activeBuffs){
        if(data.activeBuffs[buff] > now) buffText += `<span style="margin-right:15px;">${buff}: 残 ${Math.floor((data.activeBuffs[buff] - now)/1000)}秒</span>`;
        else delete data.activeBuffs[buff];
    }
    document.getElementById("buffStatus").innerHTML = buffText;
    if(isBuffActive("❄️ フロストエナジー") && (tickInterval - (now - data.lastUpdate) <= 20000)) updateUI();
}

function updateUI(){
    document.getElementById("money").innerText=data.money.toLocaleString();
    document.getElementById("points").innerText=data.points.toLocaleString();
    document.getElementById("mint").innerText=data.mint.toLocaleString();
    document.getElementById("alienMints").innerText = (data.alienMints || 0).toLocaleString();

    const stocksDiv=document.getElementById("stocks"); stocksDiv.innerHTML="";
    const showPrediction = isBuffActive("❄️ フロストエナジー") && (getTickInterval() - (Date.now() - (data.lastUpdate||0))) <= 20000;

    data.stocks.forEach((stock,i)=>{
        const card=document.createElement("div"); card.className="card"+(stock.unlocked?"":" locked");
        let profitDisplay = "";
        if(stock.owned > 0 && stock.buyPrice > 0){
            let diff = stock.price - stock.buyPrice;
            let sign = diff >= 0 ? "+" : ""; let color = diff >= 0 ? "lime" : "#fca5a5";
            profitDisplay = `<span style="color:${color}; font-size:12px;">(${sign}${diff.toLocaleString()}G/株)</span>`;
        }
        let predictHtml = "";
        if (stock.unlocked && showPrediction) {
            let pSign = stock.nextChange >= 0 ? "+" : ""; let pColor = stock.nextChange >= 0 ? "lime" : "#fca5a5";
            predictHtml = `<p style="font-size:14px; margin:5px 0; color:${pColor}; font-weight:bold;">👁️ 予知: 次回 ${pSign}${stock.nextChange.toLocaleString()}G</p>`;
        }
        card.innerHTML=`<h3 style="margin: 0 0 5px 0; font-size:18px;">${stock.name}</h3>
            <p style="font-size:18px; font-weight:bold; margin:5px 0; color:#fff;">現在値: ${stock.price.toLocaleString()}G ${profitDisplay}</p>
            ${predictHtml}
            <p style="margin:5px 0; color:#e9d5ff;">保有: ${stock.owned.toLocaleString()}株</p>`;

        if(stock.unlocked){
            const actions = document.createElement("div"); actions.className = "card-actions";
            const btnGroup = document.createElement("div"); btnGroup.className = "btn-group";
            [1,10,100].forEach(n=>{
                const btn=document.createElement("button"); btn.innerText="買 "+n;
                btn.onclick=()=>buyStock(i,n); if(data.money < stock.price * n) btn.disabled = true;
                btnGroup.appendChild(btn);
            });
            actions.appendChild(btnGroup);
            const btnGroupSell = document.createElement("div"); btnGroupSell.className = "btn-group";
            [1,10,100].forEach(n=>{
                const btn=document.createElement("button"); btn.innerText="売 "+n;
                btn.onclick=()=>sellStock(i,n); if(stock.owned<n) btn.disabled=true;
                btnGroupSell.appendChild(btn);
            });
            actions.appendChild(btnGroupSell); card.appendChild(actions);
        }else{
            const unlockBtn=document.createElement("button"); unlockBtn.className="unlockBtn menu-btn";
            unlockBtn.innerText=stock.unlockCost.toLocaleString()+"Pで解放";
            if(data.points >= stock.unlockCost){ unlockBtn.disabled = false; unlockBtn.onclick=()=>unlockStock(i); } 
            else { unlockBtn.disabled = true; unlockBtn.style.animation = "none"; }
            card.appendChild(unlockBtn);
        }
        stocksDiv.appendChild(card);
    });
    drawAllGraph(); save();
}

function buyStock(i,amount){
    const stock=data.stocks[i]; const cost=stock.price*amount; if(data.money<cost) return;
    data.money-=cost;
    stock.buyPrice = stock.owned === 0 ? stock.price : Math.floor(((stock.buyPrice * stock.owned) + cost) / (stock.owned + amount));
    stock.owned+=amount; data.totalBuys++; updateUI();
}

function sellStock(i,amount){
    const stock=data.stocks[i]; if(stock.owned<amount) return;
    const diff = stock.price - stock.buyPrice;
    let mult = isBuffActive("🍸 ソルティドッグ") ? 1.5 : 1;
    let profit = Math.floor(diff * mult); // ソルティドッグ効果
    let totalGain = (stock.buyPrice + profit) * amount; // 売上総額
    data.money += totalGain;
    
    if(profit > 0){
        let mintGain = Math.max(1, Math.floor((profit * amount) / 10));
        if(isBuffActive("🌍 星の恵み")) mintGain *= 3; else if(isBuffActive("💎 ミントブースト")) mintGain *= 2;
        data.mint += mintGain;
    }
    stock.owned-=amount; if(stock.owned === 0) stock.buyPrice = 0; updateUI();
}

function unlockStock(i){ if(data.points>=data.stocks[i].unlockCost){ data.points-=data.stocks[i].unlockCost; data.stocks[i].unlocked=true; data.stocks[i].visible=true; updateUI(); } }

function openScreen(id){ document.getElementById(id).style.display="flex"; }
function closeScreen(id){ if(id === 'gachaScreen' && isGachaSpinning) return; document.getElementById(id).style.display="none"; }
function showNotification(text){ alert(text); } // 簡略化のため標準アラート

// ★ ガチャロジック (省略)
function getActiveMintTable() { return [{name:"ベーシックミント",rate:19},{name:"ウォーターミント",rate:4},{name:"チョコチップミント",rate:3},{name:"ブラッドミント",rate:1},{name:"ブルーミント",rate:15},{name:"レッドミント",rate:15},{name:"グリーンミント",rate:15},{name:"パープルミント",rate:6},{name:"ミルクミント",rate:1},{name:"ゴールドミント",rate:4},{name:"ギャラクシーミント",rate:0.5},{name:"プラネットミント",rate:1},{name:"マグマミント",rate:1},{name:"ソルティミント",rate:1},{name:"スパイシーミント",rate:3},{name:"フロストミント",rate:3},{name:"マダムミント",rate:3},{name:"ダークマターミント",rate:0.1},{name:"スイーツミント",rate:1},{name:"ガスミント",rate:1},{name:"アルコールミント",rate:1},{name:"エッグミント",rate:0.5},{name:"焼け焦げたミント",rate:0.4}]; }

function openGacha() { openScreen("gachaScreen"); document.getElementById("gachaResult").innerText = "READY"; }
function spinGacha(times, isFree = false){
    if(isGachaSpinning) return;
    if(!isFree) { const cost = 15 * times; if(data.mint < cost){ alert("破片不足"); return; } data.mint -= cost; updateUI(); }
    isGachaSpinning = true; document.getElementById("gachaBtn").disabled = true; document.getElementById("gacha10Btn").disabled = true;
    const table = getActiveMintTable(); const resBox = document.getElementById("gachaResult"); let cnt = 0;
    const anim=setInterval(()=>{
        resBox.innerText = "✨ ガチャ回転中... ✨"; cnt++;
        if(cnt>15){
            clearInterval(anim); let results = {};
            for(let i=0; i<times; i++) {
                let rand=Math.random()*100, total=0, drop="";
                for(let m of table){ total+=m.rate; if(rand<=total){ drop=m.name; break; } }
                results[drop] = (results[drop] || 0) + 1;
                data.mintInventory[drop] = (data.mintInventory[drop]||0) + 1;
            }
            resBox.innerHTML = Object.entries(results).map(([k,v]) => `${k} x${v}`).join("<br>");
            isGachaSpinning = false; document.getElementById("gachaBtn").disabled = false; document.getElementById("gacha10Btn").disabled = false; save();
        }
    },80);
}

// ★ 素材合成 (クラフト) ロジック
function openCraft() {
    openScreen("craftScreen");
    const m1 = document.getElementById("craftMat1"), m2 = document.getElementById("craftMat2");
    m1.innerHTML = ""; m2.innerHTML = "";
    let opts = "";
    for(let m in data.mintInventory){ if(data.mintInventory[m] > 0) opts += `<option value="${m}">${m} (所持:${data.mintInventory[m]})</option>`; }
    if(!opts) opts = `<option value="">素材がありません</option>`;
    m1.innerHTML = opts; m2.innerHTML = opts;
}

function doCraft() {
    let m1 = document.getElementById("craftMat1").value, m2 = document.getElementById("craftMat2").value;
    if(!m1 || !m2) return alert("素材を選んでください");

    let req = {}; req[m1] = (req[m1]||0)+1; req[m2] = (req[m2]||0)+1;
    for(let k in req){ if((data.mintInventory[k]||0) < req[k]) return alert(`${k} が足りません`); }
    for(let k in req) data.mintInventory[k] -= req[k];

    let result = "";
    const isPair = (a, b) => (m1===a && m2===b) || (m1===b && m2===a);

    if(isPair("ベーシックミント", "ベーシックミント")) result = "🛠️ ポーションのもと";
    else if(isPair("🛠️ ポーションのもと", "スイーツミント")) result = "🛠️ スイーツのもと";
    else if(isPair("🛠️ ポーションのもと", "アルコールミント")) result = "🛠️ お酒のもと";
    else if(isPair("🛠️ ポーションのもと", "ガスミント")) result = "🛠️ 炭酸のもと";

    if(result) {
        data.mintInventory[result] = (data.mintInventory[result]||0) + 1;
        if(!data.discoveredMints.includes(result)) data.discoveredMints.push(result);
        alert(`成功！ ${result} を作成しました。`);
    } else {
        for(let k in req) data.mintInventory[k] += req[k]; // 返却
        alert("その組み合わせでは何もできないようだ… (素材は返却されました)");
    }
    save(); openCraft();
}

// ★ 醸造ロジック
const bases = ["🛠️ ポーションのもと", "🛠️ スイーツのもと", "🛠️ お酒のもと", "🛠️ 炭酸のもと"];

function openBrew() {
    openScreen("brewScreen");
    const bSel = document.getElementById("brewBase"), m1 = document.getElementById("brewMat1"), m2 = document.getElementById("brewMat2");
    bSel.innerHTML = ""; m1.innerHTML = ""; m2.innerHTML = "";
    
    let baseOpts = "", mintOpts = "";
    for(let m in data.mintInventory) {
        if(data.mintInventory[m] > 0) {
            let opt = `<option value="${m}">${m} (所持:${data.mintInventory[m]})</option>`;
            if(bases.includes(m)) baseOpts += opt; else mintOpts += opt;
        }
    }
    bSel.innerHTML = baseOpts || `<option value="">ベース素材がありません</option>`;
    m1.innerHTML = mintOpts || `<option value="">追加ミントがありません</option>`;
    m2.innerHTML = mintOpts || `<option value="">追加ミントがありません</option>`;
}

function doBrew() {
    const base = document.getElementById("brewBase").value, m1 = document.getElementById("brewMat1").value, m2 = document.getElementById("brewMat2").value;
    if(!base || !m1 || !m2) return alert("ベースと追加ミント2つを選択してください");

    let req = {}; req[base] = 1; req[m1] = (req[m1]||0)+1; req[m2] = (req[m2]||0)+1;
    for(let k in req){ if((data.mintInventory[k]||0) < req[k]) return alert(`${k} が足りません`); }
    for(let k in req) data.mintInventory[k] -= req[k];

    let result = "";
    const isMatch = (req1, req2) => {
        if(req2 === "任意") return m1 === req1 || m2 === req1;
        return (m1 === req1 && m2 === req2) || (m1 === req2 && m2 === req1);
    };

    // レシピ判定
    for(let r of treeRecipes) {
        if(base === r.base && isMatch(r.m1, r.m2)) { result = r.result; break; }
    }

    if(!result && base === "🛠️ ポーションのもと") {
        // 通常ポーション（ランダム）
        let pool = ["💰 黄金の雫", "⭐ 知識の霊薬", "📈 ハイパードライブ薬", "🛡 プロテクトジェル", "💎 ミントブースト", "⏳ タイムワープ薬"];
        result = pool[Math.floor(Math.random() * pool.length)];
    }

    if(result) {
        if(result === "❓ 異質なポーション") { data.alienPotionCount++; }
        data.potions[result] = (data.potions[result]||0) + 1;
        if(!data.discoveredPotions.includes(result)) data.discoveredPotions.push(result);
        alert(`🧪 ${result} を醸造しました！`);
    } else {
        for(let k in req) data.mintInventory[k] += req[k];
        alert("失敗！レシピ通りに調合しないと失敗してしまうようだ…");
    }
    save(); openBrew();
}

// ★ レシピツリー表示
function openRecipeTree() {
    closeScreen('brewScreen'); openScreen('recipeTreeScreen');
    const container = document.getElementById("recipeTreeContainer"); container.innerHTML = "";
    const isAllUnlocked = data.stocks.every(s => s.unlocked); // 全株解放判定

    bases.forEach(baseName => {
        const baseDiv = document.createElement("div"); baseDiv.className = "tree-base"; baseDiv.innerText = baseName;
        const ul = document.createElement("ul"); ul.className = "tree-ul";
        
        let relatedRecipes = treeRecipes.filter(r => r.base === baseName);
        relatedRecipes.forEach(r => {
            const li = document.createElement("li"); li.className = "tree-li";
            
            // 異質なポーションの特殊開示判定
            let isAlien = r.result === "❓ 異質なポーション";
            let isRevealed = data.discoveredPotions.includes(r.result) || (isAlien && isAllUnlocked);

            if(isRevealed) {
                li.innerHTML = `<span class="tree-recipe">${r.result}</span> <br><span style="color:#a855f7; font-size:12px;">└ ${r.m1} ＋ ${r.m2}</span>`;
            } else {
                li.innerHTML = `<span class="tree-unknown">❓ ？？？？？？</span> <br><span style="color:#666; font-size:12px;">└ ${r.m1} ＋ ${r.m2 === "任意" ? "任意" : "？？？"}</span>`;
            }
            ul.appendChild(li);
        });
        
        container.appendChild(baseDiv); container.appendChild(ul);
    });
}

function openBag() {
    openScreen("bagScreen"); const list = document.getElementById("bagList"); list.innerHTML = "";
    for(let p in data.potions){
        if(data.potions[p] > 0){
            const div = document.createElement("div"); div.className = "list-item";
            div.innerHTML = `<div><div style="font-weight:bold; font-size:18px;">${p} x${data.potions[p]}</div><div style="font-size:12px; color:#e9d5ff;">${potionEffects[p].desc}</div></div><button class="menu-btn" onclick="usePotion('${p}')">使う</button>`;
            list.appendChild(div);
        }
    }
}

function usePotion(pName){
    if(!data.potions[pName] || data.potions[pName] <= 0) return;
    const effect = potionEffects[pName]; data.potions[pName]--;
    let isChocoActive = isBuffActive("🍦 チョコミントポーション") && pName !== "🍦 チョコミントポーション";
    let m = isChocoActive ? 2 : 1;
    if(effect.type === "instant"){ effect.action(m); alert(pName + " を使用しました！"); } 
    else if (effect.type === "buff"){ data.activeBuffs[pName] = Date.now() + (effect.duration * m); alert(pName + " の効果発動！"); }
    updateUI(); openBag();
}
