<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>SPACE STOCK</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap" rel="stylesheet">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family:'Orbitron',sans-serif;
    background: radial-gradient(circle at top,#0b0f2a,#000);
    color:white;
}
#game{ padding:20px; }
h1{
    text-align:center;
    font-size:40px;
    text-shadow:none;
}
.card{
    background:rgba(168,85,247,0.6));
    border:1px solid #a855f7;
    padding:15px;
    margin:10px;
    border-radius:15px;
    box-shadow:0 0 15px rgba(0,255,255,0.4);
    transition:0.3s;
    position:relative;
}
.card:hover{
    transform:scale(1.05);
    box-shadow:0 0 25px cyan;
}
button{
    background:black;
    border:#a855f7;
    color:#a855f7;
    padding:5px 10px;
    margin:3px;
    cursor:pointer;
}
button:hover{
    background:cyan;
    color:black;
}
.locked{ opacity:0.3; }
#stocks{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
}
canvas{
    background:black;
    border:none;
    margin-top:10px;
}
#nicknameScreen{
    position:fixed;
    inset:0;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}
input{
    padding:10px;
    font-size:18px;
}
.flavor{
    position:absolute;
    background:rgba(0,0,0,0.9);
    border:1px solid cyan;
    padding:10px;
    border-radius:10px;
    box-shadow:0 0 15px cyan;
    display:none;
    width:200px;
    z-index:100;
    top:10px;
    right:10px;
}
#bgCanvas{
    position:fixed;
    top:0;
    left:0;
    width:100vw;
    height:100vh;
    z-index:-999;
    pointer-events:none;
}
#allGraph{
    width:100%;
    background:black;
    border:1px solid cyan;
    margin-bottom:20px;
}
@media (max-width: 600px){
    h1{
        font-size:24px;
    }

    #stocks{
        grid-template-columns:1fr;
    }

    canvas{
        width:100%;
        height:120px;
    }

    button{
        font-size:12px;
        padding:4px;
    }
}
#tooltip{
    position:fixed;
    background:rgba(0,0,0,0.9);
    border:1px solid cyan;
    padding:8px;
    color:white;
    font-size:14px;
    pointer-events:none;
    display:none;
    z-index:1000;
}
</style>
</head>
<body>    
<canvas id="bgCanvas"></canvas>
    
<div id="nicknameScreen">
    <h1>SPACE STOCK</h1>
    <p>ニックネームを入力</p>
    <input id="nicknameInput">
    <button onclick="startGame()">START</button>
</div>

<div id="game" style="display:none;">
    <h1>SPACE STOCK MARKET</h1>
    <p>👤 <span id="playerName"></span></p>
    <p>💰 所持金: <span id="money"></span>G</p>
    <p>⭐ ポイント: <span id="points"></span></p>
    <p>⏳ 次の変動まで: <span id="timer"></span></p>
    <h2>📊 全銘柄グラフ</h2>
<canvas id="allGraph" height="300"></canvas>
    <div id="stocks"></div>
</div>

<script>
window.onload = function(){

    const bgCanvas = document.getElementById("bgCanvas");
    const bgCtx = bgCanvas.getContext("2d");

    function resize(){
        bgCanvas.width = window.innerWidth;
        bgCanvas.height = window.innerHeight;
    }

    resize();
    window.addEventListener("resize", resize);

    let stars = [];

    for(let i=0;i<150;i++){
        stars.push({
            x:Math.random()*bgCanvas.width,
            y:Math.random()*bgCanvas.height,
            size:Math.random()*2,
            speed:Math.random()*0.5+0.2
        });
    }

    function animateStars(){
        bgCtx.clearRect(0,0,bgCanvas.width,bgCanvas.height);
        bgCtx.fillStyle="white";

        stars.forEach(star=>{
            star.y+=star.speed;
            if(star.y>bgCanvas.height){
                star.y=0;
                star.x=Math.random()*bgCanvas.width;
            }
            bgCtx.beginPath();
            bgCtx.arc(star.x,star.y,star.size,0,Math.PI*2);
            bgCtx.fill();
        });

        requestAnimationFrame(animateStars);
    }

    animateStars();
};
let audioCtx;
let bgmOscillators=[];
let data = JSON.parse(localStorage.getItem("spaceStockData")) || null;

if(!data){
    data={
        nickname:"",
        money:10000,
        points:0,
        stocks:[],
        lastUpdate:Date.now()
    };

    const personalities=[
        "安定志向の巨大企業。市場の守護者。",
        "乱高下する危険銘柄。ハイリスク。",
        "急成長中の宇宙スタートアップ。",
        "衰退気味の老舗企業。",
        "バブル気味の話題株。",
        "AI制御の未来企業。",
        "異星資源開発会社。",
        "量子技術ベンチャー。",
        "エネルギー革命銘柄。",
        "未来医療テック企業。"
    ];

    const types=["stable","volatile","growth","decline","bubble","volatile","growth","stable","growth","stable"];

    for(let i=0;i<10;i++){
        data.stocks.push({
            name:"STOCK-"+(i+1),
            price:Math.floor(Math.random()*500)+500,
            owned:0,
            unlocked:i<3,
            personality:personalities[i],
            personalityType:types[i],
            history:[],
            canSell:true
        });
    }
}

function save(){
    localStorage.setItem("spaceStockData",JSON.stringify(data));
}

function initAudio(){
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    startBGM();
}

function playBuySound(){
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type="sawtooth";
    osc.frequency.value=600;
    gain.gain.value=0.1;
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.frequency.exponentialRampToValueAtTime(200,audioCtx.currentTime+0.2);
    osc.stop(audioCtx.currentTime+0.2);
}

function startBGM(){
    const notes=[110,220,165];
    notes.forEach(freq=>{
        const osc=audioCtx.createOscillator();
        const gain=audioCtx.createGain();
        osc.type="sine";
        osc.frequency.value=freq;
        gain.gain.value=0.02;
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        bgmOscillators.push(osc);
    });
}

function startGame(){
    const name=document.getElementById("nicknameInput").value;
    if(name.trim()=="")return;
    data.nickname=name;
    initAudio();
    save();
    init();
}

function init(){
    document.getElementById("nicknameScreen").style.display="none";
    document.getElementById("game").style.display="block";
    document.getElementById("playerName").innerText=data.nickname;
    updateUI();
    setInterval(updateTimer,1000);
    checkPriceUpdate();
}

function updateUI(){
    document.getElementById("money").innerText=data.money;
    document.getElementById("points").innerText=data.points;
    const stocksDiv=document.getElementById("stocks");
    stocksDiv.innerHTML="";

    data.stocks.forEach((stock,i)=>{
        const card=document.createElement("div");
        card.className="card"+(stock.unlocked?"":" locked");

        card.innerHTML=`
            <h3>${stock.name}</h3>
            <p>価格: ${stock.price}G</p>
            <p>保有: ${stock.owned}</p>
        `;
        card.onmousemove = (e) => {
    const tooltip = document.getElementById("tooltip");
    tooltip.style.display = "block";
    tooltip.style.left = e.clientX + 15 + "px";
    tooltip.style.top = e.clientY + 15 + "px";
    tooltip.innerText = stock.personality;
};

card.onmouseleave = () => {
    document.getElementById("tooltip").style.display = "none";
};

        if(stock.unlocked){
            [1,10,100].forEach(n=>{
                const btn=document.createElement("button");
                btn.innerText=n+"株買う";
                btn.onclick=()=>buyStock(i,n);
                card.appendChild(btn);
            });

            [1,10,100].forEach(n=>{
    const sellBtn=document.createElement("button");
    sellBtn.innerText=n+"株売る";
    sellBtn.onclick=()=>sellStock(i,n);
    if(!stock.canSell || stock.owned<n) sellBtn.disabled=true;
    card.appendChild(sellBtn);
});
        }else{
            const unlockBtn=document.createElement("button");
            unlockBtn.innerText="500Pで解放";
            unlockBtn.onclick=()=>unlockStock(i);
            card.appendChild(unlockBtn);
        }

        stocksDiv.appendChild(card);
    });

    save();
    drawAllGraph();
}

function buyStock(i,amount){
    const stock=data.stocks[i];
    const cost=stock.price*amount;

    if(data.money < cost) return;

    data.money -= cost;
    stock.owned += amount;
    stock.canSell = false;

    // 安全チェック付き
    if(audioCtx){
        playBuySound();
    }

    updateUI();
}

function sellStock(i,amount){
    const stock=data.stocks[i];

    if(!stock.canSell) return;

    if(stock.owned>=amount){
        data.money+=stock.price*amount;
        stock.owned-=amount;
        updateUI();
    }
}
function unlockStock(i){
    if(data.points>=500){
        data.points-=500;
        data.stocks[i].unlocked=true;
        updateUI();
    }
}

function checkPriceUpdate(){
    const now=Date.now();
    if(now-data.lastUpdate>=60000){
        updatePrices();
        data.lastUpdate=now;
    }
    setTimeout(checkPriceUpdate,10000);
}

function updatePrices(){
    data.stocks.forEach(stock=>{
        let change=0;
        switch(stock.personalityType){
            case "stable": change=(Math.random()-0.5)*20; break;
            case "volatile": change=(Math.random()-0.5)*300; break;
            case "growth": change=Math.random()*50; break;
            case "decline": change=-(Math.random()*50); break;
            case "bubble":
                change=Math.random()<0.2?(Math.random()-0.5)*600:Math.random()*80;
                break;
            default: change=(Math.random()-0.5)*100;
        }
        stock.price=Math.max(10,Math.floor(stock.price+change));
        stock.history.push(stock.price);
        if(stock.history.length>20) stock.history.shift();
        stock.canSell=true;
    });
    data.points+=100;
    updateUI();
}

function updateTimer(){
    const remain=60000-(Date.now()-data.lastUpdate);
    const sec=Math.max(0,Math.floor(remain/1000));
    document.getElementById("timer").innerText=sec+"秒";
}

function drawGraph(canvas,dataArr){
    const ctx = canvas.getContext("2d");
    const width = canvas.width;
    const height = canvas.height;

    ctx.clearRect(0,0,width,height);

    ctx.strokeStyle = "cyan";
    ctx.lineWidth = 2;
    ctx.beginPath();

    // データがない場合は真ん中に線
    if(dataArr.length === 0){
        ctx.moveTo(0,height/2);
        ctx.lineTo(width,height/2);
        ctx.stroke();
        return;
    }

    const max = Math.max(...dataArr);
    const min = Math.min(...dataArr);

    dataArr.forEach((v,i)=>{
        const x = (i / (dataArr.length - 1 || 1)) * width;
        const y = height - ((v - min) / (max - min || 1)) * height;

        if(i === 0){
            ctx.moveTo(x,y);
        }else{
            ctx.lineTo(x,y);
        }
    });

    ctx.stroke();
}

function drawAllGraph(){
    const canvas = document.getElementById("allGraph");
    const ctx = canvas.getContext("2d");

    canvas.width = canvas.clientWidth;
    canvas.height = 300;

    ctx.clearRect(0,0,canvas.width,canvas.height);

    const colors = [
        "cyan","lime","yellow","orange","red",
        "magenta","white","blue","pink","lightgreen"
    ];

    data.stocks.forEach((stock,index)=>{

        if(stock.history.length < 2) return;

        const max = Math.max(...stock.history);
        const min = Math.min(...stock.history);

        ctx.beginPath();
        ctx.strokeStyle = colors[index % colors.length];
        ctx.lineWidth = 2;

        stock.history.forEach((price,i)=>{
            const x = (i/(stock.history.length-1)) * canvas.width;
            const y = canvas.height - ((price-min)/(max-min||1))*canvas.height;

            if(i===0) ctx.moveTo(x,y);
            else ctx.lineTo(x,y);
        });

        ctx.stroke();
    });
}
</script>
 <div id="tooltip"></div>   
</body>
</html>
